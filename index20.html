<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM EventListener-Random color by button click</title>
</head>
<body>
    <h1 id="headerElement">Hello World! Index 20</h1>
    <button id="changeColorBtn">Change Color</button>

    <script>
        var btn=document.getElementById('changeColorBtn');
        var colorArray=["red","yellow","green","blue","purple","pink","brown",'cyan']
        
        btn.addEventListener('click',function(){

            // Random Number Generator(Interger value)
            var rendom=Math.random();
            var r=rendom*10
            var result=Math.floor(r)
            console.log(result );

            var element=document.getElementById('headerElement');
            element.style.color=colorArray[result];
        });
 
    </script>
</body>
</html>
