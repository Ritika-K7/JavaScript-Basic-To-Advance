<!DOCTYPE html>
<html lang="en">

<body>
    <h1>Hello World! index 25</h1>
    <script>
        // for Loop

        // var x=0;

        //     console.log(colorArray[x]);

        var colorArray=['red','pink','brown','orange','blue','green','purple','cyan','indigo','white']
        for(var i=0  ; i<colorArray.length ; i=i+1  ){
            console.log(colorArray[i]);
        }

        //Print 1-20 number
        for(var i=1  ; i<21 ; i=i+1  ){
            console.log(i);
        }

        //Table of 2
        for(var i=2 ; i<21; i=i+2  ){
            console.log(i);
        }




    </script>
