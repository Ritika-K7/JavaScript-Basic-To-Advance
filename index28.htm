<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
</head>
<body>
    <div id="toDoContainer">
        

    </div>
    <script>
        var todos=['car wash','cat food','gaming','home work','play cricket']
        var todosE1=document.getElementById('toDoContainer');

        for(var i=0;i<todos.length;i++){

            var textNode=document.createTextNode(todos[i]);
            var pE1=document.createElement('p')
            pE1.appendChild(textNode);
            todosE1.appendChild(pE1);

        }
        
        
    </script>
    
</body>
</html>
