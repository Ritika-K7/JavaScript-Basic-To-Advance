<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reusable Code</title>
</head>
<body>
    <h1>Hello World! Index 16</h1>
    <script>
        function mathFunction(pNumOne,pAction,pNumTwo){
            var result;
            if(pAction=='+'){
                result=pNumOne+pNumTwo;
            }
            else if(pAction=='-'){
                result=pNumOne-pNumTwo;               
            }
            else if(pAction=='*'){
                result=pNumOne*pNumTwo;
            }
            else if(pAction=='/'){
                result=pNumOne/pNumTwo;      
            }
            return result;
        }
        var result=mathFunction(20,"*",10);
        console.log(result);
    </script>
</body>
</html>
